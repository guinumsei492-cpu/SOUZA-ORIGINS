<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUZA SUPPLY | THE NEW ERA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;900&display=swap');

        :root {
            --primary: #ffffff;
            --bg: #000000;
            --card: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--bg); 
            color: var(--primary); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Header Pesado */
        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(40px, 12vw, 100px);
            font-weight: 700;
            letter-spacing: -5px;
            line-height: 0.9;
            text-transform: uppercase;
        }

        .scroll-down {
            margin-top: 50px;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* Seção de Produtos */
        .container { max-width: 1400px; margin: 0 auto; padding: 50px 20px; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .product-card {
            position: relative;
            background: var(--card);
            height: 550px;
            overflow: hidden;
            border: 1px solid #111;
            transition: 0.5s ease;
        }

        /* Imagem corrigida para carregar sempre */
        .product-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: 1s cubic-bezier(0.075, 0.82, 0.165, 1);
            display: block;
        }

        .product-card:hover img { transform: scale(1.05); opacity: 0.7; }

        .info {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,1));
        }

        .category { font-size: 10px; letter-spacing: 3px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .name { font-family: 'Syncopate'; font-size: 20px; margin-bottom: 10px; }
        .price { font-size: 18px; font-weight: 300; margin-bottom: 20px; display: block;}

        .buy-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .buy-btn:hover { background: #555; color: #fff; }

        footer { padding: 60px 20px; text-align: center; border-top: 1px solid #111; color: #333; font-size: 12px; letter-spacing: 5px; }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr; }
            h1 { font-size: 50px; }
        }
    </style>
</head>
<body>

<header>
    <div style="letter-spacing: 8px; color: #444; margin-bottom: 15px; font-size: 12px;">EST. 2026 / SALVADOR</div>
    <h1>SOUZA<br>SUPPLY</h1>
    <div class="scroll-down">Exclusive Drop</div>
</header>

<div class="container">
    <div class="product-grid">
        
        <!-- Produto 1: Conjunto Syna Style -->
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=800" alt="Conjunto Streetwear">
            <div class="info">
                <div class="category">Sets / Tracksuits</div>
                <div class="name">SYNA TRACKSUIT KIT</div>
                <span class="price">R$ 289,90</span>
                <a href="https://wa.me/557182768278?text=Quero%20o%20Kit%20Syna" class="buy-btn">Reserve Now</a>
            </div>
        </div>

        <!-- Produto 2: T-Shirt Blessed -->
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&q=80&w=800" alt="Oversized Black Tee">
            <div class="info">
                <div class="category">Tops / Oversized</div>
                <div class="name">BLESSED ANGELS TEE</div>
                <span class="price">R$ 149,90</span>
                <a href="https://wa.me/557182768278?text=Quero%20a%20Blessed%20Angels" class="buy-btn">Reserve Now</a>
            </div>
        </div>

        <!-- Produto 3: Baggy Jeans -->
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&q=80&w=800" alt="Baggy Denim">
            <div class="info">
                <div class="category">Bottoms / Baggy</div>
                <div class="name">BAGGY NIGHT DENIM</div>
                <span class="price">R$ 219,90</span>
                <a href="https://wa.me/557182768278?text=Quero%20a%20Calça%20Baggy" class="buy-btn">Reserve Now</a>
            </div>
        </div>

    </div>
</div>

<footer>SOUZA SUPPLY LIMITED COLLECTION &copy; 2026</footer>

</body>
</html>
