<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUZA SUPPLY | THE NEW ERA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;900&display=swap');

        :root {
            --primary: #ffffff;
            --bg: #000000;
            --card: #0a0a0a;
            --accent: #ff0000; /* Cor de detalhe (opcional) */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body { 
            background-color: var(--bg); 
            color: var(--primary); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Cursor Customizado Pesado */
        #cursor {
            width: 20px; height: 20px; background: #fff; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; transition: transform 0.2s;
        }

        /* Header Estilo High-End */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(40px, 12vw, 120px);
            font-weight: 700;
            letter-spacing: -5px;
            line-height: 0.9;
            text-transform: uppercase;
        }

        .scroll-down {
            margin-top: 50px;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        /* Seção de Produtos */
        .container { max-width: 1400px; margin: 0 auto; padding: 100px 20px; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .product-card {
            position: relative;
            background: var(--card);
            height: 600px;
            overflow: hidden;
            border: 1px solid #111;
            transition: 0.5s ease;
        }

        .product-card:hover { border-color: #333; }

        .product-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: 1s cubic-bezier(0.075, 0.82, 0.165, 1);
            opacity: 0.7;
        }

        .product-card:hover img { transform: scale(1.1); opacity: 1; }

        .info {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 40px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            transform: translateY(20px);
            transition: 0.5s;
        }

        .product-card:hover .info { transform: translateY(0); }

        .category { font-size: 10px; letter-spacing: 3px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
        .name { font-family: 'Syncopate'; font-size: 24px; margin-bottom: 15px; }
        .price { font-size: 20px; font-weight: 300; margin-bottom: 25px; display: block;}

        /* Botões Estilo Shopify Premium */
        .buy-btn {
            display: inline-block;
            padding: 15px 35px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .buy-btn:hover { background: #000; color: #fff; border: 1px solid #fff; }

        /* Footer */
        footer { padding: 100px 20px; text-align: center; border-top: 1px solid #111; color: #222; font-size: 12px; letter-spacing: 10px; }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr; }
            .product-card { height: 500px; }
        }
    </style>
</head>
<body>

<div id="cursor"></div>

<header>
    <div class="subtitle" style="letter-spacing: 10px; color: #444; margin-bottom: 20px;">EST. 2026</div>
    <h1>SOUZA<br>SUPPLY</h1>
    <div class="scroll-down">Scroll to Drop</div>
</header>

<div class="container">
    <div class="product-grid">
        
        <!-- Produto 1 -->
        <div class="product-card">
            <img src="https://cf.shopee.com.br/file/br-11134207-7qukw-ljm3o2z8f7mf9d" alt="Kit Syna">
            <div class="info">
                <div class="category">Sets / Tracksuits</div>
                <div class="name">SYNA WORLD SUMMER KIT</div>
                <span class="price">R$ 289,90</span>
                <a href="https://wa.me/557182768278?text=Quero%20o%20Kit%20Syna" class="buy-btn">Get Piece</a>
            </div>
        </div>

        <!-- Produto 2 -->
        <div class="product-card">
            <img src="https://cf.shopee.com.br/file/br-11134207-7qukw-ljm3o3288888f1" alt="Blessed T-Shirt">
            <div class="info">
                <div class="category">Tops / Oversized</div>
                <div class="name">BLESSED ANGELS TEE</div>
                <span class="price">R$ 149,90</span>
                <a href="https://wa.me/557182768278?text=Quero%20a%20Blessed%20Angels" class="buy-btn">Get Piece</a>
            </div>
        </div>

        <!-- Produto 3 -->
        <div class="product-card">
            <img src="https://cf.shopee.com.br/file/br-11134207-7r98o-lzp6b66t6666e1" alt="Baggy Jeans">
            <div class="info">
                <div class="category">Bottoms / Baggy</div>
                <div class="name">BAGGY NIGHT DENIM</div>
                <span class="price">R$ 219,90</span>
                <a href="https://wa.me/557182768278?text=Quero%20a%20Calça%20Baggy" class="buy-btn">Get Piece</a>
            </div>
        </div>

    </div>
</div>

<footer>SOUZA SUPPLY LIMITED EDITION</footer>

<script>
    // Script do Cursor Customizado
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('mouseenter', () => cursor.style.transform = 'scale(4)');
        link.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
    });
</script>

</body>
</html>
